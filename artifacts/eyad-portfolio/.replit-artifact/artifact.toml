kind = "web"
previewPath = "/"
title = "Eyad Alashry Portfolio"
version = "1.0.0"
id = "artifacts/eyad-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23235

[services.development]
run = "pnpm --filter @workspace/eyad-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eyad-portfolio", "run", "build" ]
publicDir = "artifacts/eyad-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23235"
BASE_PATH = "/"
